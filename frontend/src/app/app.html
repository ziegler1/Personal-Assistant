<mat-sidenav-container class="app-shell">
  @if (!isMobile()) {
    <mat-sidenav class="app-sidenav" mode="side" opened disableClose>
      <app-sidebar />
    </mat-sidenav>
  }

  <mat-sidenav-content class="app-content">
    <main class="page-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>

@if (isMobile()) {
  <app-bottom-nav />
}
