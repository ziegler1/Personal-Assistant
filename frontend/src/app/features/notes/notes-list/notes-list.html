<div class="notes-page">
  <div class="page-header">
    <h1>Notes</h1>
    <button mat-flat-button color="primary" (click)="newNote()">
      <mat-icon>add</mat-icon>
      New Note
    </button>
  </div>

  <div class="filters">
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Content type</mat-label>
      <mat-select [ngModel]="selectedType()" (ngModelChange)="selectedType.set($event); load()">
        <mat-option value="">All types</mat-option>
        @for (type of contentTypes; track type) {
          <mat-option [value]="type">{{ type }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Tag</mat-label>
      <input
        matInput
        [ngModel]="tagFilter()"
        (ngModelChange)="tagFilter.set($event)"
        (keyup.enter)="load()"
        placeholder="Filter by tag"
      />
    </mat-form-field>

    <button mat-stroked-button (click)="load()">Apply</button>
  </div>

  @if (loading()) {
    <p class="status-text">Loading notes…</p>
  } @else if (notes().length === 0) {
    <p class="status-text">No notes found.</p>
  } @else {
    <div class="notes-list">
      @for (note of notes(); track note.id) {
        <app-note-row [note]="note" (open)="openNote(note.id)" (delete)="deleteNote(note.id)" />
      }
    </div>
  }
</div>
