<div class="home-page">
  <div class="home-hero">
    <div class="home-logo">
      <mat-icon class="logo-icon">auto_awesome</mat-icon>
      <h1>Zig's Personal Assistant</h1>
    </div>

    <div class="search-pill" (click)="focusSearch()">
      <mat-icon class="search-icon">search</mat-icon>
      <input
        #searchInput
        type="text"
        class="search-input"
        placeholder="Search your notes…"
        [ngModel]="query()"
        (ngModelChange)="query.set($event)"
        (keyup.enter)="goSearch()"
        (click)="$event.stopPropagation()"
      />
      <button mat-icon-button class="go-button" (click)="$event.stopPropagation(); goSearch()" aria-label="Search">
        <mat-icon>arrow_forward</mat-icon>
      </button>
    </div>
  </div>

  @if (recentNotes().length > 0) {
    <div class="recent-notes">
      <h2>Recent notes</h2>
      <div class="recent-notes-list">
        @for (note of recentNotes(); track note.id) {
          <app-note-row [note]="note" (open)="openNote(note.id)" (delete)="deleteNote(note.id)" />
        }
      </div>
    </div>
  }
</div>

<button mat-fab color="primary" class="quick-add-fab" (click)="openQuickAdd()" aria-label="Quick add note">
  <mat-icon>add</mat-icon>
</button>
